---
layout: default
---
<div id="main">
  <header id="header">
    <h1>{{ page.title }}</h1>
    <a href="/">← 返回首页</a>
  </header>

  <section id="thumbnails">
    {% assign current_folder = page.dir | split: '/' | last %}
    {% for image in site.static_files %}
      {% if image.path contains 'gallery/' and image.path contains current_folder %}
        <article>
          <a class="thumbnail" href="{{ image.path }}">
            <img src="{{ image.path }}" alt="{{ image.basename }}" />
          </a>
        </article>
      {% endif %}
    {% endfor %}
  </section>
</div>
